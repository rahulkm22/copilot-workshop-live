<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      margin-bottom: 30px;
      text-align: center;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .card h2 {
      margin-bottom: 15px;
      color: #333;
      font-size: 1.3em;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #333;
      font-weight: 500;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
      flex: 0;
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
    }

    .filters {
      margin-bottom: 20px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 4px;
    }

    .filter-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .task-list {
      list-style: none;
    }

    .task-item {
      background: #f9f9f9;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .task-item:hover {
      background: #f0f0f0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .task-title {
      font-size: 1.1em;
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }

    .task-description {
      color: #666;
      font-size: 0.9em;
      margin-bottom: 10px;
    }

    .task-meta {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 0.85em;
      font-weight: 600;
    }

    .badge-status {
      color: white;
    }

    .badge-status.todo {
      background: #ef4444;
    }

    .badge-status.in-progress {
      background: #eab308;
      color: #333;
    }

    .badge-status.done {
      background: #22c55e;
    }

    .badge-priority {
      color: white;
    }

    .badge-priority.high {
      background: #dc2626;
      font-weight: 700;
    }

    .badge-priority.medium {
      background: #f59e0b;
    }

    .badge-priority.low {
      background: #10b981;
    }

    .badge-category {
      background: #e0e7ff;
      color: #4c1d95;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state p {
      font-size: 1.1em;
      margin-bottom: 10px;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 15px;
      border: 1px solid #fca5a5;
    }

    .success {
      background: #dcfce7;
      color: #166534;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 15px;
      border: 1px solid #86efac;
    }

    .loading {
      text-align: center;
      color: #666;
      padding: 20px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Task Manager</h1>

    <div class="content">
      <!-- Create Task Form -->
      <div class="card">
        <h2>Create Task</h2>
        <div id="createMessage"></div>
        <form id="createForm">
          <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required maxlength="100">
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" maxlength="500"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="priority">Priority</label>
              <select id="priority" name="priority">
                <option value="">Default (medium)</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>

            <div class="form-group">
              <label for="category">Category</label>
              <input type="text" id="category" name="category" maxlength="50" placeholder="e.g., work">
            </div>
          </div>

          <div class="button-group">
            <button type="submit" class="btn-primary">Create Task</button>
            <button type="reset" class="btn-secondary">Clear</button>
          </div>
        </form>
      </div>

      <!-- Tasks List -->
      <div class="card">
        <h2>Tasks</h2>

        <!-- Filters -->
        <div class="filters">
          <div class="filter-row">
            <select id="filterStatus">
              <option value="">All Status</option>
              <option value="todo">Todo</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>

            <select id="filterPriority">
              <option value="">All Priority</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>

            <select id="filterCategory">
              <option value="">All Categories</option>
            </select>

            <button type="button" class="btn-secondary" onclick="loadTasks()">
              Refresh
            </button>
          </div>
        </div>

        <!-- Tasks Container -->
        <div id="tasksContainer">
          <div class="loading">
            <div class="spinner"></div>
            <p>Loading tasks...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // API Functions
    async function apiCall(method, endpoint, data = null) {
      const options = {
        method,
        headers: { 'Content-Type': 'application/json' }
      };

      if (data) {
        options.body = JSON.stringify(data);
      }

      const response = await fetch(endpoint, options);
      const result = await response.json();

      if (!response.ok) {
        throw new Error(result.error || `HTTP ${response.status}`);
      }

      return result;
    }

    // Load and display tasks
    async function loadTasks() {
      try {
        const params = new URLSearchParams();

        const status = document.getElementById('filterStatus').value;
        if (status) params.append('status', status);

        const priority = document.getElementById('filterPriority').value;
        if (priority) params.append('priority', priority);

        const category = document.getElementById('filterCategory').value;
        if (category) params.append('category', category);

        const tasks = await apiCall('GET', `/api/tasks?${params}`);

        displayTasks(tasks);
        updateCategoryFilter(tasks);
      } catch (error) {
        displayError(`Failed to load tasks: ${error.message}`);
      }
    }

    // Display tasks in the UI
    function displayTasks(tasks) {
      const container = document.getElementById('tasksContainer');

      if (tasks.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>📭 No tasks found</p>
            <p style="font-size: 0.9em;">Create a new task to get started!</p>
          </div>
        `;
        return;
      }

      const taskHTML = tasks.map((task) => `
        <div class="task-item">
          <div class="task-title">${escapeHtml(task.title)}</div>
          ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
          
          <div class="task-meta">
            <span class="badge badge-status ${task.status}">${formatStatus(task.status)}</span>
            <span class="badge badge-priority ${task.priority}">${formatPriority(task.priority)}</span>
            <span class="badge badge-category">${escapeHtml(task.category)}</span>
          </div>

          <div class="task-actions">
            <select onchange="updateTaskStatus('${task.id}', this.value)" class="btn-small" style="padding: 4px; cursor: pointer;">
              <option value="">Update Status</option>
              <option value="todo">Todo</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>

            <select onchange="updateTaskPriority('${task.id}', this.value)" class="btn-small" style="padding: 4px; cursor: pointer;">
              <option value="">Update Priority</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>

            <button onclick="deleteTask('${task.id}')" class="btn-danger">Delete</button>
          </div>
        </div>
      `).join('');

      container.innerHTML = taskHTML;
    }

    // Update category filter dropdown
    function updateCategoryFilter(tasks) {
      const categories = new Set(tasks.map((t) => t.category));
      const select = document.getElementById('filterCategory');
      const currentValue = select.value;

      const options = ['<option value="">All Categories</option>'];
      categories.forEach((cat) => {
        options.push(`<option value="${cat}">${escapeHtml(cat)}</option>`);
      });

      select.innerHTML = options.join('');
      select.value = currentValue || '';
    }

    // Create task
    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const taskData = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        priority: document.getElementById('priority').value || undefined,
        category: document.getElementById('category').value || undefined
      };

      try {
        await apiCall('POST', '/api/tasks', taskData);
        displaySuccess('Task created successfully!');
        document.getElementById('createForm').reset();
        await loadTasks();
      } catch (error) {
        displayError(`Failed to create task: ${error.message}`);
      }
    });

    // Update task status
    async function updateTaskStatus(id, status) {
      if (!status) return;

      try {
        await apiCall('PUT', `/api/tasks/${id}`, { status });
        displaySuccess('Task updated!');
        await loadTasks();
      } catch (error) {
        displayError(`Failed to update task: ${error.message}`);
      }
    }

    // Update task priority
    async function updateTaskPriority(id, priority) {
      if (!priority) return;

      try {
        await apiCall('PUT', `/api/tasks/${id}`, { priority });
        displaySuccess('Task updated!');
        await loadTasks();
      } catch (error) {
        displayError(`Failed to update task: ${error.message}`);
      }
    }

    // Delete task
    async function deleteTask(id) {
      if (!confirm('Are you sure you want to delete this task?')) {
        return;
      }

      try {
        await apiCall('DELETE', `/api/tasks/${id}`);
        displaySuccess('Task deleted!');
        await loadTasks();
      } catch (error) {
        displayError(`Failed to delete task: ${error.message}`);
      }
    }

    // UI Helpers
    function formatStatus(status) {
      const map = {
        'todo': '📋 Todo',
        'in-progress': '⏳ In Progress',
        'done': '✅ Done'
      };
      return map[status] || status;
    }

    function formatPriority(priority) {
      const map = {
        'low': '⬇️ Low',
        'medium': '➡️ Medium',
        'high': '⬆️ High'
      };
      return map[priority] || priority;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function displayError(message) {
      showMessage(message, 'error');
    }

    function displaySuccess(message) {
      showMessage(message, 'success');
    }

    function showMessage(message, type) {
      const container = document.getElementById('createMessage');
      const className = type === 'error' ? 'error' : 'success';
      container.innerHTML = `<div class="${className}">${escapeHtml(message)}</div>`;
      setTimeout(() => {
        container.innerHTML = '';
      }, 4000);
    }

    // Load tasks on page load
    document.addEventListener('DOMContentLoaded', loadTasks);

    // Setup filter listeners
    document.getElementById('filterStatus').addEventListener('change', loadTasks);
    document.getElementById('filterPriority').addEventListener('change', loadTasks);
    document.getElementById('filterCategory').addEventListener('change', loadTasks);
  </script>
</body>
</html>
